<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Request</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260228b') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard-pro.css', v='20260308b') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 920px;">
        <div class="header">
            <h1><i class="fas fa-user-shield"></i> Privacy / Data Request</h1>
            <p class="meta-line">Submit a data export, deletion, or correction request.</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <div class="card">
            <form method="POST" action="{{ url_for('privacy_request') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
                    <div class="form-group">
                        <label for="request_type">Request Type</label>
                        <select id="request_type" name="request_type" required>
                            <option value="export">Data Export</option>
                            <option value="delete">Data Deletion</option>
                            <option value="correction">Data Correction</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="subject_line">Subject</label>
                        <input id="subject_line" name="subject_line" type="text" placeholder="Short summary">
                    </div>
                </div>
                <div class="form-group">
                    <label for="details">Details</label>
                    <textarea id="details" name="details" rows="6" required placeholder="Describe exactly what data you want exported/deleted/corrected."></textarea>
                </div>
                <div class="toolbar">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Submit Request</button>
                    <a href="{{ url_for('menu') if role != 'super_admin' else url_for('super_admin_dashboard') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
