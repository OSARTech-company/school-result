name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      DATABASE_URL: "postgresql://user:pass@localhost:5432/testdb"
      DEFAULT_STUDENT_PASSWORD: "password123"
      DEFAULT_TEACHER_PASSWORD: "teachers123"
      SUPER_ADMIN_PASSWORD: "supersecurepassword"
      BACKUP_SIGNING_KEY: "abcdefghijklmnopqrstuvwxyz123456"
      RUN_STARTUP_DDL: "0"
      RUN_STARTUP_BOOTSTRAP: "0"
      ALLOW_RUNTIME_SCHEMA_HEAL: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q test_app.py
